<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>🍼 이유식 식단표</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fdf9f4;--white:#ffffff;--card:#ffffff;
  --brown:#6b4c2a;--brown2:#8b6340;--orange:#e07840;--orange2:#f0a060;
  --green:#4a7c5a;--green2:#6aac7a;
  --red:#c0392b;--red-bg:#fdecea;--red-border:#e57373;
  --tag:#e8ddd0;--tag-text:#5a4030;
  --border:#e8ddd0;--text:#3a2e22;--text2:#8a7a6a;
  --shadow:0 2px 12px rgba(107,76,42,.12);
  --radius:14px;
}
html{height:100%;height:-webkit-fill-available}
body{height:100%;height:-webkit-fill-available;overflow:hidden;font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:13px}

/* ── HEADER ── */
.hdr{position:fixed;top:0;left:0;right:0;z-index:200;background:var(--brown);color:#fff;
  display:flex;align-items:center;padding:0 14px;height:52px;gap:10px;
  box-shadow:0 2px 10px rgba(0,0,0,.25)}
.hdr-logo{font-size:17px;font-weight:900;letter-spacing:-.5px;flex:1}
.hdr-logo span{font-size:12px;font-weight:400;opacity:.7;margin-left:4px}
.hdr-btn{background:rgba(255,255,255,.18);border:none;color:#fff;
  padding:5px 11px;border-radius:20px;font-size:11px;font-family:inherit;
  cursor:pointer;white-space:nowrap;transition:.2s}
.hdr-btn.active{background:var(--orange2);font-weight:700}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:var(--white);border-top:1.5px solid var(--border);
  display:flex;height:58px;box-shadow:0 -2px 10px rgba(0,0,0,.08)}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:2px;border:none;background:transparent;
  cursor:pointer;color:var(--text2);font-family:inherit;font-size:10px;transition:.2s}
.bnav-btn .ico{font-size:20px;transition:.2s}
.bnav-btn.active{color:var(--orange)}
.bnav-btn.active .ico{transform:scale(1.15)}

/* ── PAGES ── */
.page{position:fixed;top:52px;left:0;right:0;bottom:58px;overflow-y:auto;
  -webkit-overflow-scrolling:touch;display:none;padding:12px 10px;
  overscroll-behavior:contain}
.page.active{display:block}

/* ── WEEK SELECTOR ── */
.week-bar{display:flex;align-items:center;gap:8px;margin-bottom:10px;
  background:var(--white);border-radius:var(--radius);padding:10px 12px;
  box-shadow:var(--shadow)}
.week-arrow{background:none;border:1.5px solid var(--border);border-radius:8px;
  width:32px;height:32px;font-size:16px;cursor:pointer;color:var(--brown);
  display:flex;align-items:center;justify-content:center}
.week-info{flex:1;text-align:center}
.week-label{font-size:13px;font-weight:700;color:var(--brown)}
.week-sub{font-size:10px;color:var(--text2);margin-top:1px}
.month-sel{padding:5px 8px;border:1.5px solid var(--border);border-radius:8px;
  font-family:inherit;font-size:12px;color:var(--text);background:var(--bg);cursor:pointer}

/* ── MEAL TOGGLE PILLS ── */
.meal-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;padding:0 2px}
.meal-pill{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);
  background:var(--white);font-size:11px;font-family:inherit;color:var(--text2);
  cursor:pointer;transition:.2s}
.meal-pill.on{background:var(--green);color:#fff;border-color:var(--green);font-weight:700}

/* ── DAY CARDS ── */
.day-card{background:var(--white);border-radius:var(--radius);
  box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden}
.day-card-hdr{background:var(--brown);color:#fff;padding:8px 14px;
  display:flex;align-items:center;gap:8px}
.day-card-hdr .dow{font-weight:900;font-size:15px}
.day-card-hdr .date-str{font-size:11px;opacity:.8}
.day-card-hdr.sat{background:#4a6080}
.day-card-hdr.sun{background:#804040}
.day-card-hdr.today{background:var(--orange)}

.meal-section{border-bottom:1px solid var(--border)}
.meal-section:last-child{border-bottom:none}
.meal-section-hdr{padding:8px 12px 4px;font-size:11px;font-weight:700;
  color:var(--brown2);display:flex;align-items:center;gap:4px}
.sub-rows{padding:0 12px 8px}
.sub-row{display:flex;align-items:flex-start;gap:6px;padding:3px 0}
.sub-label{font-size:10px;color:var(--text2);min-width:42px;padding-top:3px;font-weight:500}
.tags-wrap{flex:1;display:flex;flex-wrap:wrap;gap:4px;align-items:center}

/* ── INGREDIENT TAGS ── */
.ing-tag{display:inline-flex;align-items:center;gap:3px;
  padding:3px 8px;border-radius:20px;font-size:11px;font-weight:500;
  background:var(--tag);color:var(--tag-text);border:1.5px solid var(--border);
  transition:.2s;cursor:default}
.ing-tag.bad{background:var(--red-bg)!important;color:var(--red)!important;
  border-color:var(--red-border)!important;animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
.ing-tag .rm{font-size:10px;cursor:pointer;opacity:.5;margin-left:1px}
.ing-tag .rm:hover{opacity:1}
.amt-badge{font-size:9px;background:rgba(0,0,0,.1);border-radius:4px;padding:0 3px}

.add-tag-btn{display:inline-flex;align-items:center;gap:2px;
  padding:3px 8px;border-radius:20px;border:1.5px dashed var(--orange2);
  background:none;color:var(--orange);font-size:11px;cursor:pointer;
  font-family:inherit;transition:.2s}
.add-tag-btn:active{background:rgba(224,120,64,.1)}

/* ── RECOMMEND STRIP ── */
.rec-strip{margin:0 10px 10px;background:linear-gradient(135deg,#fff8f0,#fdeede);
  border:1.5px solid var(--orange2);border-radius:var(--radius);padding:10px 12px}
.rec-strip-title{font-size:11px;font-weight:700;color:var(--orange);margin-bottom:6px;
  display:flex;align-items:center;gap:4px}
.rec-chips{display:flex;flex-wrap:wrap;gap:5px}
.rec-chip{padding:4px 10px;border-radius:20px;background:var(--orange2);
  color:#fff;font-size:11px;font-weight:500;cursor:pointer;transition:.2s}
.rec-chip:active{opacity:.7}

/* ── WARN BANNER ── */
.warn-banner{margin:0 10px 8px;background:var(--red-bg);border:1.5px solid var(--red-border);
  border-radius:10px;padding:8px 12px;font-size:11px;color:var(--red);display:none}
.warn-banner.show{display:block}

/* ── MODAL ── */
.modal{display:none;position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.5);align-items:flex-end;justify-content:center}
.modal.show{display:flex}
.modal-box{background:var(--white);border-radius:20px 20px 0 0;
  width:100%;max-height:85vh;overflow-y:auto;padding:20px 16px 32px;
  animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;
  margin:0 auto 16px}
.modal-title{font-size:16px;font-weight:700;color:var(--brown);margin-bottom:14px}
.modal-label{font-size:11px;color:var(--text2);margin-bottom:4px;margin-top:10px}
.modal-select,.modal-input,.modal-num{width:100%;padding:10px 12px;
  border:1.5px solid var(--border);border-radius:10px;font-family:inherit;
  font-size:13px;color:var(--text);background:var(--bg)}
.modal-select:focus,.modal-input:focus,.modal-num:focus{outline:none;border-color:var(--orange)}
.modal-num{width:100px}
.modal-row{display:flex;gap:8px;margin-top:8px;align-items:center}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.m-btn{flex:1;padding:12px;border-radius:12px;border:none;cursor:pointer;
  font-family:inherit;font-size:14px;font-weight:700;transition:.2s}
.m-btn.ok{background:var(--orange);color:#fff}
.m-btn.ok:active{background:#c05828}
.m-btn.cancel{background:var(--border);color:var(--text2)}

/* ── SECTION TITLE ── */
.sec-title{font-size:14px;font-weight:700;color:var(--brown);
  border-bottom:2px solid var(--orange2);padding-bottom:6px;margin-bottom:12px;
  display:flex;align-items:center;gap:6px}

/* ── INGREDIENT MASTER ── */
.ing-cat-card{background:var(--white);border-radius:var(--radius);
  box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden}
.ing-cat-hdr{background:var(--brown2);color:#fff;padding:8px 14px;
  font-size:13px;font-weight:700}
.ing-cat-body{padding:10px 12px}
.ing-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.ing-item{display:inline-flex;align-items:center;gap:4px;
  padding:4px 10px;border-radius:20px;background:var(--tag);
  color:var(--tag-text);font-size:12px;border:1.5px solid var(--border)}
.ing-item .del{font-size:11px;cursor:pointer;opacity:.5}
.ing-item .del:hover{opacity:1;color:var(--red)}
.ing-add-row{display:flex;gap:6px}
.ing-add-input{flex:1;padding:7px 10px;border:1.5px solid var(--border);
  border-radius:8px;font-family:inherit;font-size:12px}
.ing-add-input:focus{outline:none;border-color:var(--orange)}
.ing-add-ok{padding:7px 14px;background:var(--orange);color:#fff;
  border:none;border-radius:8px;font-family:inherit;font-size:12px;
  font-weight:700;cursor:pointer}

/* ── COMBO PAGE ── */
.combo-card{background:var(--white);border-radius:var(--radius);
  box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden}
.combo-card-hdr{padding:8px 14px;font-size:13px;font-weight:700;color:#fff}
.combo-card.good .combo-card-hdr{background:var(--green)}
.combo-card.bad .combo-card-hdr{background:var(--red)}
.combo-body{padding:10px 12px}
.combo-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.combo-item{display:flex;align-items:center;justify-content:space-between;
  padding:6px 10px;border-radius:8px;font-size:12px}
.combo-card.good .combo-item{background:#e8f4ec;color:var(--green)}
.combo-card.bad .combo-item{background:var(--red-bg);color:var(--red)}
.combo-del{background:none;border:none;cursor:pointer;font-size:14px;opacity:.5}
.combo-del:hover{opacity:1}
.combo-add-row{display:flex;gap:6px}
.combo-inp{flex:1;padding:7px 8px;border:1.5px solid var(--border);
  border-radius:8px;font-family:inherit;font-size:12px;min-width:0}
.combo-inp:focus{outline:none;border-color:var(--orange)}
.combo-ok{padding:7px 12px;border:none;border-radius:8px;
  font-family:inherit;font-size:12px;font-weight:700;color:#fff;cursor:pointer}
.combo-card.good .combo-ok{background:var(--green)}
.combo-card.bad .combo-ok{background:var(--red)}

/* ── AMOUNT PAGE ── */
.amt-table-wrap{overflow-x:auto;border-radius:var(--radius);
  box-shadow:var(--shadow);margin-bottom:12px}
.amt-table{width:100%;border-collapse:collapse;background:var(--white);min-width:400px}
.amt-table th{background:var(--brown);color:#fff;padding:8px 6px;
  text-align:center;font-size:11px;font-weight:700}
.amt-table td{border:1px solid var(--border);padding:6px;
  text-align:center;font-size:11px}
.amt-table tr:nth-child(even) td{background:#faf6f0}
.amt-inp{border:none;background:transparent;text-align:center;
  font-family:inherit;font-size:11px;width:50px;color:var(--text);
  border-bottom:1px dashed var(--border)}
.amt-inp:focus{outline:none;border-bottom-color:var(--orange)}

/* ── ARCHIVE PAGE ── */
.archive-card{background:var(--white);border-radius:var(--radius);
  box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden}
.archive-hdr{background:var(--brown2);color:#fff;padding:10px 14px;
  display:flex;align-items:center;justify-content:space-between}
.archive-hdr .wk-label{font-weight:700;font-size:13px}
.archive-hdr .wk-date{font-size:10px;opacity:.8}
.archive-body{padding:10px 12px;font-size:11px;color:var(--text2);max-height:120px;
  overflow:hidden;position:relative}
.archive-body.open{max-height:none}
.archive-expand{text-align:center;padding:6px;font-size:11px;color:var(--orange);
  cursor:pointer;border-top:1px solid var(--border);background:var(--white)}
.archive-empty{text-align:center;color:var(--text2);padding:40px 20px;font-size:13px}

/* ── AUTO SAVE TOAST ── */
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--brown);color:#fff;padding:8px 18px;border-radius:20px;
  font-size:12px;opacity:0;pointer-events:none;transition:.3s;z-index:400;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── HEADER BABY PROFILE ── */
.hdr-baby{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.hdr-avatar{width:34px;height:34px;border-radius:50%;border:2px solid rgba(255,255,255,.6);
  flex-shrink:0;background:rgba(255,255,255,.2);overflow:hidden;
  display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer}
.hdr-avatar img{width:34px;height:34px;border-radius:50%;object-fit:cover;display:block;flex-shrink:0}
.hdr-baby-info{min-width:0}
.hdr-baby-name{font-size:15px;font-weight:900;letter-spacing:-.3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-baby-age{font-size:10px;opacity:.75;margin-top:1px;white-space:nowrap}

/* ── BABY PROFILE PAGE ── */
.profile-hero{background:linear-gradient(160deg,var(--brown) 0%,var(--brown2) 100%);
  border-radius:var(--radius);padding:24px 20px 20px;margin-bottom:14px;
  display:flex;flex-direction:column;align-items:center;gap:12px;
  box-shadow:0 4px 20px rgba(107,76,42,.25)}
.profile-avatar-wrap{position:relative;width:90px;height:90px}
.profile-avatar{width:90px;height:90px;border-radius:50%;border:3px solid rgba(255,255,255,.7);
  overflow:hidden;cursor:pointer;background:rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;font-size:40px}
.profile-avatar img{width:90px;height:90px;border-radius:50%;object-fit:cover;display:block}
.profile-avatar-edit{position:absolute;bottom:2px;right:2px;
  width:26px;height:26px;border-radius:50%;background:var(--orange);
  border:2px solid #fff;display:flex;align-items:center;justify-content:center;
  font-size:13px;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.25)}
.profile-name-disp{font-size:22px;font-weight:900;color:#fff;letter-spacing:-.5px}
.profile-age-disp{font-size:13px;color:rgba(255,255,255,.8);margin-top:-4px}
.profile-dday{background:rgba(255,255,255,.18);border-radius:20px;
  padding:6px 16px;font-size:12px;color:#fff;font-weight:700}

.profile-form-card{background:var(--white);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:16px;margin-bottom:12px}
.pf-row{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
.pf-row:last-child{margin-bottom:0}
.pf-label{font-size:11px;font-weight:700;color:var(--brown2)}
.pf-input{padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;
  font-family:inherit;font-size:14px;color:var(--text);background:var(--bg);width:100%}
.pf-input:focus{outline:none;border-color:var(--orange)}
.pf-save-btn{width:100%;padding:14px;background:var(--orange);color:#fff;
  border:none;border-radius:12px;font-family:inherit;font-size:15px;
  font-weight:700;cursor:pointer;margin-top:4px;transition:.2s}
.pf-save-btn:active{background:#c05828}

.profile-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:14px 12px;text-align:center}
.stat-num{font-size:22px;font-weight:900;color:var(--orange)}
.stat-label{font-size:10px;color:var(--text2);margin-top:2px}

/* ── SAFE AREA (iPhone notch + 홈 인디케이터) ── */
@supports(padding-bottom:env(safe-area-inset-bottom)){
  .hdr{padding-top:env(safe-area-inset-top);height:calc(52px + env(safe-area-inset-top))}
  .page{top:calc(52px + env(safe-area-inset-top));bottom:calc(58px + env(safe-area-inset-bottom))}
  .bnav{padding-bottom:env(safe-area-inset-bottom);height:calc(58px + env(safe-area-inset-bottom))}
  .toast{bottom:calc(70px + env(safe-area-inset-bottom))}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-baby" onclick="showPage('profile', document.querySelector('.bnav-btn[data-page=profile]'))">
    <div class="hdr-avatar" id="hdrAvatar">👶</div>
    <div class="hdr-baby-info">
      <div class="hdr-baby-name" id="hdrBabyName">이유식 식단표</div>
      <div class="hdr-baby-age" id="hdrBabyAge">👶 프로필을 설정해주세요</div>
    </div>
  </div>
  <!-- 월령 select 제거 — 생년월일 기반 자동 계산 -->
  <select id="globalMonth" style="display:none" onchange="onMonthChange()">
    <option value="4">4개월</option><option value="5">5개월</option>
    <option value="6" selected>6개월</option><option value="7">7개월</option>
    <option value="8">8개월</option><option value="9">9개월</option>
    <option value="10">10개월</option><option value="11">11개월</option>
    <option value="12">12개월</option>
  </select>
</header>

<!-- PAGES -->
<div class="page active" id="page-plan">
  <!-- week bar -->
  <div class="week-bar">
    <button class="week-arrow" onclick="shiftWeek(-1)">‹</button>
    <div class="week-info">
      <div class="week-label" id="weekLabel">—</div>
      <div class="week-sub" id="weekSub">이번 주</div>
    </div>
    <button class="week-arrow" onclick="shiftWeek(1)">›</button>
  </div>
  <!-- meal pills -->
  <div class="meal-pills" id="mealPills"></div>
  <!-- warn banner -->
  <div class="warn-banner" id="warnBanner"></div>
  <!-- recommend strip -->
  <div class="rec-strip" id="recStrip" style="display:none">
    <div class="rec-strip-title">✨ 추천 조합 (탭해서 빠른 추가)</div>
    <div class="rec-chips" id="recChips"></div>
  </div>
  <!-- day cards -->
  <div id="dayCards"></div>
</div>

<div class="page" id="page-ing">
  <div class="sec-title">🥕 재료 목록 관리</div>
  <div id="ingMaster"></div>
</div>

<div class="page" id="page-combo">
  <div class="sec-title">🔗 재료 궁합 관리</div>
  <div id="comboMaster"></div>
</div>

<div class="page" id="page-amt">
  <div class="sec-title">⚖️ 월령별 권장 섭취량(g)</div>
  <div class="amt-table-wrap"><table class="amt-table" id="amtTable"></table></div>
</div>

<div class="page" id="page-archive">
  <div class="sec-title">📁 주간 식단 기록</div>
  <div id="archiveList"></div>
</div>

<!-- BABY PROFILE PAGE -->
<div class="page" id="page-profile">
  <!-- Hero card -->
  <div class="profile-hero" id="profileHero">
    <div class="profile-avatar-wrap">
      <div class="profile-avatar" id="profileAvatar" onclick="document.getElementById('photoInput').click()">👶</div>
      <div class="profile-avatar-edit" onclick="document.getElementById('photoInput').click()">📷</div>
    </div>
    <div class="profile-name-disp" id="profileNameDisp">아기 이름</div>
    <div class="profile-age-disp" id="profileAgeDisp">생일을 입력해주세요</div>
    <div class="profile-dday" id="profileDday">🎂 D+0</div>
  </div>

  <!-- Stats -->
  <div class="profile-stats">
    <div class="stat-card">
      <div class="stat-num" id="statDays">0</div>
      <div class="stat-label">태어난 지 (일)</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statMonth">0개월</div>
      <div class="stat-label">현재 월령</div>
    </div>
  </div>

  <!-- Edit form -->
  <div class="profile-form-card">
    <div class="sec-title" style="margin-bottom:14px">✏️ 정보 수정</div>
    <div class="pf-row">
      <div class="pf-label">아기 이름</div>
      <input class="pf-input" id="pfName" placeholder="예: 김하늘" maxlength="10">

function loadState(){
  try {

    if(raw){
      const parsed = JSON.parse(raw);
      if(!parsed.baby) parsed.baby = {name:'',birth:'',photo:''};
      return parsed;
    }
  } catch(e){}
  return defaultState();
}

let saveTimer = null;
function save(){
  try { localStorage.setItem('babyMeal_v2', JSON.stringify(S)); } catch(e){}
  showToast('✅ 자동 저장됨');
}
function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(save, 800);
}

// ═══════════════════════════════════════════
// DATE HELPERS
// ═══════════════════════════════════════════
function getMondayOfWeek(offset){
  const now = new Date();
  const day = now.getDay(); // 0=Sun
  const diff = (day === 0) ? -6 : 1 - day;
  const mon = new Date(now);
  mon.setDate(now.getDate() + diff + offset * 7);
  mon.setHours(0,0,0,0);
  return mon;
}

function dateStr(d){ // YYYY-MM-DD
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function fmtDate(d){
  return `${d.getMonth()+1}/${d.getDate()}`;
}
function isToday(d){
  const t = new Date(); t.setHours(0,0,0,0);
  return d.getTime() === t.getTime();
}
function isSunday(d){ return d.getDay() === 0; }
function isSaturday(d){ return d.getDay() === 6; }

// 1-week date array starting from Monday
function getTwoWeekDates(){
  const mon = getMondayOfWeek(S.weekOffset);
  const dates = [];
  for(let i=0;i<7;i++){
    const d = new Date(mon);
    d.setDate(mon.getDate()+i);
    dates.push(d);
  }
  return dates;
}

function cellKey(dateObj, mealId, sub){
  return `${dateStr(dateObj)}|${mealId}|${sub}`;
}

function getCell(dateObj, mealId, sub){
  const k = cellKey(dateObj, mealId, sub);
  if(!S.cells[k]) S.cells[k] = [];
  return S.cells[k];
}

// ═══════════════════════════════════════════
// BAD COMBO CHECK  ← 끼니 전체 재료를 합산해서 비교
// ═══════════════════════════════════════════
function badSet(){
  return S.combos.bad.map(p => p.map(x=>x.toLowerCase()).sort().join('§'));
}

// 해당 날짜의 특정 끼니(mealId) 전체 재료 이름 목록 반환
function getAllMealNames(dateObj, mealId){
  const row = MEAL_ROWS.find(r=>r.id===mealId);
  if(!row) return [];
  const names = [];
  row.subs.forEach(sub=>{
    getCell(dateObj, mealId, sub).forEach(i=>names.push(i.name));
  });
  return names;
}

// name 이 같은 끼니의 다른 재료들과 나쁜 궁합인지 확인
function isBad(name, allMealNames){
  const bs = badSet();
  const ln = name.toLowerCase();
  for(const other of allMealNames){
    if(other===name) continue;
    const key = [ln, other.toLowerCase()].sort().join('§');
    if(bs.includes(key)) return true;
  }
  return false;
}

// 날짜 카드의 경고 배너용: 끼니별로 나쁜 재료 수집
function getDayBadPairs(dateObj){
  const pairs = [];
  for(const row of MEAL_ROWS){
    const allNames = getAllMealNames(dateObj, row.id);
    allNames.forEach(n=>{
      if(isBad(n, allNames)) pairs.push({day:dateStr(dateObj),meal:row.label,name:n});
    });
  }
  return pairs;
}

function showPage(id, btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  if(btn) btn.classList.add('active');
  if(id==='plan') renderPlan();
  if(id==='ing') renderIngMaster();
  if(id==='combo') renderCombos();
  if(id==='amt') renderAmounts();
  if(id==='archive') renderArchive();
  if(id==='profile') renderProfile();
}

// COPY PREV DAY
// ═══════════════════════════════════════════
function copyPrevDay(dateObj){
  const prev = new Date(dateObj);
  prev.setDate(prev.getDate()-1);
  const prevStr = dateStr(prev);
  const todayStr = dateStr(dateObj);

  // 전날에 데이터가 있는지 확인
  const hasPrev = MEAL_ROWS.some(row=>
    row.subs.some(sub=>(S.cells[`${prevStr}|${row.id}|${sub}`]||[]).length>0)
  );
  if(!hasPrev){
    showToast('⚠️ 전날 식단이 없습니다');
    return;
  }

  // 오늘에 이미 데이터가 있으면 확인
  const hasToday = MEAL_ROWS.some(row=>
    row.subs.some(sub=>(S.cells[`${todayStr}|${row.id}|${sub}`]||[]).length>0)
  );
  if(hasToday && !confirm('오늘 식단을 전날과 동일하게 덮어쓰시겠습니까?')) return;

  // 복사
  MEAL_ROWS.forEach(row=>{
    row.subs.forEach(sub=>{
      const prevKey = `${prevStr}|${row.id}|${sub}`;
      const todayKey = `${todayStr}|${row.id}|${sub}`;
      const src = S.cells[prevKey];
      if(src && src.length){
        S.cells[todayKey] = src.map(i=>({...i})); // deep copy
      } else {
        delete S.cells[todayKey];
      }
    });
  });

  scheduleSave();
  renderPlan();
  showToast('📋 전날 식단 복사 완료!');
}

function buildTags(wrap, dateObj, mealId, sub){
  wrap.innerHTML = '';
  const items = getCell(dateObj, mealId, sub);
  // ★ 같은 끼니 전체 재료를 수집해서 cross-sub 비교
  const allMealNames = getAllMealNames(dateObj, mealId);

  items.forEach((item,idx)=>{
    const tag = document.createElement('span');
    const bad = isBad(item.name, allMealNames);
    tag.className = 'ing-tag' + (bad ? ' bad':'');
    if(bad) tag.title = '⚠️ 궁합 주의';
    const defAmt = S.amounts[S.month]?.[sub] || '';
    const dispAmt = item.amount || defAmt;
    tag.innerHTML = item.name
      + (dispAmt ? `<span class="amt-badge">${dispAmt}g</span>`:'')
      + `<span class="rm" onclick="removeIngInPlace(event,'${dateStr(dateObj)}','${mealId}','${sub}',${idx})">×</span>`;
    wrap.appendChild(tag);
  });

  const addBtn = document.createElement('button');
  addBtn.className = 'add-tag-btn';
  addBtn.textContent = '+ 추가';
  addBtn.onclick = ()=>openModal(dateObj, mealId, sub);
  wrap.appendChild(addBtn);
}

// ★ 재료 삭제: 해당 끼니의 모든 sub tags만 새로고침 (스크롤 유지)
function removeIngInPlace(e, dStr, mealId, sub, idx){
  e.stopPropagation();
  const k = `${dStr}|${mealId}|${sub}`;
  if(!S.cells[k]) return;
  S.cells[k].splice(idx,1);
  scheduleSave();
  refreshMealTags(dStr, mealId);
  refreshWarnBanner();
}

// 특정 끼니의 모든 sub 태그 영역만 재렌더 (DOM 최소 갱신)
function refreshMealTags(dStr, mealId){
  const d = new Date(dStr);
  const row = MEAL_ROWS.find(r=>r.id===mealId);
  if(!row) return;
  row.subs.forEach(sub=>{
    const wrapId = `tags-${dStr}-${mealId}-${sub}`;
    const wrap = document.getElementById(wrapId);
    if(wrap) buildTags(wrap, d, mealId, sub);
  });
}

// 경고 배너만 갱신
function refreshWarnBanner(){
  const dates = getTwoWeekDates();
  const warnEl = document.getElementById('warnBanner');
  const allBad = [];
  dates.forEach(d => getDayBadPairs(d).forEach(p=>allBad.push(p)));
  if(allBad.length){
    const msgs = [...new Set(allBad.map(p=>`⚠️ ${p.day.slice(5)} ${p.meal}: "${p.name}"`))];
    warnEl.innerHTML = msgs.join('<br>');
    warnEl.classList.add('show');
  } else {
    warnEl.classList.remove('show');
  }
}

function archiveWeekOf(sundayDate){
  // find Monday of that week
  const mon = new Date(sundayDate);
  mon.setDate(sundayDate.getDate()-6);
  const weekKey = dateStr(mon);

  // already archived?
  if(S.archive.find(a=>a.weekKey===weekKey)){
    if(!confirm('이 주의 식단이 이미 저장되어 있습니다. 덮어쓰시겠습니까?')) return;
    S.archive = S.archive.filter(a=>a.weekKey!==weekKey);
  }

  // collect cells for that week
  const data = {};
  for(let i=0;i<7;i++){
    const d = new Date(mon); d.setDate(mon.getDate()+i);
    MEAL_ROWS.forEach(row=>{
      row.subs.forEach(sub=>{
        const k = `${dateStr(d)}|${row.id}|${sub}`;
        if(S.cells[k]?.length) data[k] = [...S.cells[k]];
      });
    });
  }

  S.archive.unshift({
    weekKey,
    label: `${mon.getMonth()+1}/${mon.getDate()} ~ ${sundayDate.getMonth()+1}/${sundayDate.getDate()}`,
    savedAt: new Date().toISOString(),
    data,
  });

  scheduleSave();
  showToast('💾 주간 식단 저장 완료!');
}

// auto-archive check every time plan renders (Sunday)
function checkAutoArchive(){
  const today = new Date(); today.setHours(0,0,0,0);
  if(today.getDay()!==0) return; // only on Sunday
  const dates = getTwoWeekDates();
  const sunday = dates.find(d=>isSunday(d)&&d.getTime()===today.getTime());
  if(!sunday) return;
  const mon = new Date(sunday); mon.setDate(sunday.getDate()-6);
  const weekKey = dateStr(mon);
  if(!S.archive.find(a=>a.weekKey===weekKey)){
    archiveWeekOf(sunday);
  }
}

function renderArchive(){
  const el = document.getElementById('archiveList');
  el.innerHTML = '';
  if(!S.archive.length){
    el.innerHTML = '<div class="archive-empty">📭 저장된 주간 식단이 없습니다.<br>매주 일요일에 자동 또는 수동으로 저장됩니다.</div>';
    return;
  }
  S.archive.forEach((rec,ai)=>{
    const card = document.createElement('div');
    card.className = 'archive-card';
    card.innerHTML = `<div class="archive-hdr">
      <div><div class="wk-label">📅 ${rec.label} 주간 식단</div>
      <div class="wk-date">저장: ${rec.savedAt?rec.savedAt.slice(0,10):''}</div></div>
      <button onclick="deleteArchive(${ai})" style="background:rgba(255,255,255,.2);border:none;color:#fff;padding:4px 8px;border-radius:8px;font-size:11px;cursor:pointer">삭제</button>
    </div>`;

    const body = document.createElement('div');
    body.className = 'archive-body';
    const lines = [];
    Object.keys(rec.data).forEach(k=>{
      const parts = k.split('|');
      const row = MEAL_ROWS.find(r=>r.id===parts[1]);
      if(!row) return;
      const items = rec.data[k];
      if(!items.length) return;
      lines.push(`${parts[0].slice(5)} ${row.label}: ${items.map(i=>i.name).join(', ')}`);
    });
    body.innerHTML = lines.length ? lines.map(l=>`<div>${l}</div>`).join('') : '식단 내용 없음';
    card.appendChild(body);

    const exp = document.createElement('div');
    exp.className = 'archive-expand';
    exp.textContent = '▼ 전체 보기';
    exp.onclick = ()=>{
      body.classList.toggle('open');
      exp.textContent = body.classList.contains('open') ? '▲ 접기' : '▼ 전체 보기';
    };
    card.appendChild(exp);
    el.appendChild(card);
  });
}

function deleteArchive(idx){
  if(!confirm('이 기록을 삭제하시겠습니까?')) return;
  S.archive.splice(idx,1);
  scheduleSave();
  renderArchive();
}

// BABY PROFILE
// ═══════════════════════════════════════════
function calcAge(birthStr){
  if(!birthStr) return null;
  const birth = new Date(birthStr); birth.setHours(0,0,0,0);
  const today = new Date(); today.setHours(0,0,0,0);
  const diffMs = today - birth;
  if(diffMs < 0) return null;
  const totalDays = Math.floor(diffMs / 86400000);

  // 만 개월 수 (생일 기준 정확 계산)
  let months = (today.getFullYear() - birth.getFullYear()) * 12
             + (today.getMonth() - birth.getMonth());
  if(today.getDate() < birth.getDate()) months--;
  if(months < 0) months = 0;

  // 남은 일수 (해당 월 일수 기준)
  const tempDate = new Date(birth);
  tempDate.setMonth(tempDate.getMonth() + months);
  const remainDays = Math.floor((today - tempDate) / 86400000);

  // 몇 개월차 = 만 개월 + 1 (1일이라도 지나면 다음 달차)
  const monthTurn = months + 1;

  return { totalDays, months, days: Math.max(0, remainDays), monthTurn };
}

function ageText(age){
  if(!age) return '생일을 입력해주세요';
  return `${age.months}개월 ${age.days}일 (${age.monthTurn}개월차)`;
}

// 생년월일 기반으로 S.month 자동 갱신 (4~12 범위 클램프)
function syncMonthFromAge(){
  const age = calcAge(S.baby.birth);
  if(!age) return;
  const clamped = Math.min(12, Math.max(4, age.monthTurn));
  S.month = clamped;
  const sel = document.getElementById('globalMonth');
  if(sel) sel.value = clamped;
}

function renderProfile(){
  const b = S.baby;
  document.getElementById('pfName').value = b.name || '';
  document.getElementById('pfBirth').value = b.birth || '';

  const age = calcAge(b.birth);
  const displayName = b.name || '우리 아기';

  document.getElementById('profileNameDisp').textContent = displayName;
  document.getElementById('profileAgeDisp').textContent = ageText(age);
  document.getElementById('profileDday').textContent = age ? `🎂 D+${age.totalDays}` : '🎂 D+?';
  document.getElementById('statDays').textContent = age ? age.totalDays : '—';
  document.getElementById('statMonth').textContent = age ? `${age.monthTurn}개월차` : '—';

  setAvatarEl('profileAvatar', b.photo, '👶', true);
}

function saveProfile(){
  S.baby.name  = document.getElementById('pfName').value.trim();
  S.baby.birth = document.getElementById('pfBirth').value;
  syncMonthFromAge();
  scheduleSave();
  renderProfile();
  updateHeader();
  showToast('💾 프로필 저장 완료!');
}

function handlePhotoUpload(e){
  const file = e.target.files[0];
  if(!file) return;
  // canvas로 리사이즈 + 원형 클리핑 없이 정사각형 크롭 후 저장
  const img = new Image();
  const url = URL.createObjectURL(file);
  img.onload = () => {
    const SIZE = 300;
    const canvas = document.createElement('canvas');
    canvas.width = SIZE; canvas.height = SIZE;
    const ctx = canvas.getContext('2d');
    // 중앙 정사각형 크롭
    const s = Math.min(img.width, img.height);
    const sx = (img.width - s) / 2;
    const sy = (img.height - s) / 2;
    ctx.drawImage(img, sx, sy, s, s, 0, 0, SIZE, SIZE);
    URL.revokeObjectURL(url);
    S.baby.photo = canvas.toDataURL('image/jpeg', 0.85);
    scheduleSave();
    renderProfile();
    updateHeader();
    showToast('📷 사진 저장 완료!');
  };
  img.src = url;
  e.target.value = '';
}

// 공통 아바타 렌더 헬퍼
function setAvatarEl(id, photo, fallback, large){
  const el = document.getElementById(id);
  if(!el) return;
  if(photo){
    const size = large ? '90px' : '34px';
    el.innerHTML = `<img src="${photo}" alt="아기사진"
      style="width:${size};height:${size};border-radius:50%;object-fit:cover;display:block;">`;
    el.style.background = 'transparent';
    el.style.fontSize = '0';
  } else {
    el.innerHTML = fallback;
    el.style.background = '';
    el.style.fontSize = '';
  }
}

function updateHeader(){
  const b = S.baby;
  const age = calcAge(b.birth);
  const displayName = b.name ? `${b.name}의 이유식` : '이유식 식단표';

  document.getElementById('hdrBabyName').textContent = displayName;

  if(age){
    document.getElementById('hdrBabyAge').textContent =
      `${age.months}개월 ${age.days}일 · ${age.monthTurn}개월차`;
  } else {
    document.getElementById('hdrBabyAge').textContent = '👶 프로필을 설정해주세요';
  }

  setAvatarEl('hdrAvatar', b.photo, '👶', false);
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
syncMonthFromAge();
document.getElementById('globalMonth').value = S.month;
updateHeader();
checkAutoArchive();
renderPlan();
</script>
